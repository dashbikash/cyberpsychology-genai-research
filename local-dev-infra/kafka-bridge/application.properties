bridge.id=my-bridge

# Point to the INTERNAL listeners (bridge is inside kafka-net)
kafka.bootstrap.servers=kafka1:9092,kafka2:9092,kafka3:9092

# HTTP interface
http.enabled=true
http.host=0.0.0.0
http.port=8080

# CORS — required for browser clients, harmless for Android
http.cors.enabled=false
http.cors.allowedOrigins=*
http.cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Producer defaults
kafka.producer.acks=1

# Consumer defaults
kafka.consumer.auto.offset.reset=earliest
